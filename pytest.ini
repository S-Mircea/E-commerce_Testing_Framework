[pytest]
base_url = https://www.saucedemo.com
testpaths = tests
pythonpath = tests
python_files = test_*.py
markers =
    smoke: Quick sanity check tests
    regression: Full regression suite
    e2e: End-to-end critical path
addopts = -v --html=test-results/report.html --self-contained-html --output=playwright-artifacts
